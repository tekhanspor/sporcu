<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Tekhan Sporcu Sistemi</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="bildirim" class="bildirim"></div>

<div id="loginEkrani" class="screen aktif">
  <div class="login-kart">
    <div class="login-logo">
      <span class="icon">🥋</span>
      <h1>Tekhan Sporcu</h1>
      <p>Motorik & Psikoloji Değerlendirme</p>
    </div>
    <div class="rol-secici">
      <button class="rol-btn aktif" onclick="rolSec('antrenor', this)">🏆 Antrenör</button>
      <button class="rol-btn" onclick="rolSec('sporcu', this)">👤 Sporcu</button>
    </div>
    <div id="loginHata" class="hata-mesaji"></div>
    <div class="form-grup">
      <label class="form-etiket">Kullanıcı Adı</label>
      <input type="text" id="loginKullanici" class="form-input" placeholder="kullanici_adi" autocomplete="username" autocapitalize="none" autocorrect="off">
    </div>
    <div class="form-grup">
      <label class="form-etiket">Şifre</label>
      <input type="password" id="loginSifre" class="form-input" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" onclick="girisYap()">Giriş Yap</button>
  </div>
</div>

<div id="antrenorEkrani" class="screen">
  <div class="header">
    <div style="flex:1">
      <div class="header-baslik">🏆 Antrenör Paneli</div>
      <div id="antrenorAdi" class="header-alt"></div>
    </div>
    <button class="btn-icon" onclick="cikisYap()">⏏</button>
  </div>
  <div class="tab-nav">
    <button class="tab-btn aktif" onclick="tabSec('sporcular', this)">👥 Sporcular</button>
    <button class="tab-btn" onclick="tabSec('yarisma', this)">🏆 Takvim</button>
    <button class="tab-btn" onclick="tabSec('linkler', this)">🎬 Videolar</button>
  </div>
  <div class="icerik">
    <div id="tab-sporcular">
      <input type="text" class="arama-input" placeholder="Sporcu ara..." id="sporcuArama" oninput="sporcuFiltrele()">
      <div id="sporcuListesiDiv"></div>
    </div>
    <div id="tab-yarisma" style="display:none">
      <div id="yarismaDiv"></div>
    </div>
    <div id="tab-linkler" style="display:none">
      <div id="antrenorLinkDiv"></div>
    </div>
  </div>
  <button class="btn-fab" id="fabBtn" onclick="sporcuEklePanelAc()">+</button>
</div>

<div id="sporcuProfilEkrani" class="screen">
  <div class="header">
    <button class="header-geri" onclick="geriGit('antrenorEkrani')">←</button>
    <div class="header-baslik" id="profilBaslik">Sporcu Profili</div>
    <button class="btn-icon" onclick="testEkleModalAc()">📊</button>
  </div>
  <div id="profilHeaderDiv"></div>
  <div class="tab-nav">
    <button class="tab-btn aktif" onclick="profilTabSec('bilgiler', this)">Bilgiler</button>
    <button class="tab-btn" onclick="profilTabSec('testler', this)">Motorik</button>
    <button class="tab-btn" onclick="profilTabSec('psikoloji', this)">Psikoloji</button>
    <button class="tab-btn" onclick="profilTabSec('recete', this)">Reçete</button>
    <button class="tab-btn" onclick="profilTabSec('grafikler', this)">📈 Grafikler</button>
  </div>
  <div class="icerik">
    <div id="ptab-bilgiler"><div id="profilBilgilerDiv"></div></div>
    <div id="ptab-testler" style="display:none"><div id="profilTestlerDiv"></div></div>
    <div id="ptab-psikoloji" style="display:none"><div id="profilPsikolojiDiv"></div></div>
    <div id="ptab-recete" style="display:none"><div id="profilReceteDiv"></div></div>
    <div id="ptab-grafikler" style="display:none"><div id="profilGrafiklerDiv"></div></div>
  </div>
</div>

<div id="sporcuEkrani" class="screen">
  <div class="header">
    <div style="flex:1">
      <div class="header-baslik" id="sporcuKullaniciAdi">Profilim</div>
      <div class="header-alt" id="sporcuKusak"></div>
    </div>
    <button class="btn-icon" onclick="cikisYap()">⏏</button>
  </div>
  <div class="tab-nav">
    <button class="tab-btn aktif" onclick="sporcuTabSec('profil', this)">👤 Profilim</button>
    <button class="tab-btn" onclick="sporcuTabSec('anketim', this)">🧠 Anket</button>
    <button class="tab-btn" onclick="sporcuTabSec('sonuclarim', this)">📋 Sonuçlarım</button>
    <button class="tab-btn" onclick="sporcuTabSec('takvim', this)">🏆 Takvim</button>
    <button class="tab-btn" onclick="sporcuTabSec('linkler', this)">🎬 Videolar</button>
  </div>
  <div class="icerik">
    <div id="stab-profil"><div id="sporcuProfilDiv"></div></div>
    <div id="stab-anketim" style="display:none"><div id="sporcuAnketDiv"></div></div>
    <div id="stab-sonuclarim" style="display:none"><div id="sporcuSonuclarDiv"></div></div>
    <div id="stab-takvim" style="display:none"><div id="sporcuYarismaDiv"></div></div>
    <div id="stab-linkler" style="display:none"><div id="sporcuLinkDiv"></div></div>
  </div>
</div>

<div id="sporcuModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-baslik" id="sporcuModalBaslik">Sporcu Ekle</div>
    <input type="hidden" id="sporcuDuzId">
    <div class="form-grup">
      <label class="form-etiket">Ad Soyad *</label>
      <input type="text" id="sAd" class="form-input" placeholder="Ahmet Yılmaz">
    </div>
    <div class="form-row">
      <div class="form-grup">
        <label class="form-etiket">Kullanıcı Adı *</label>
        <input type="text" id="sKullaniciAdi" class="form-input" placeholder="ahmet123" autocapitalize="none">
      </div>
      <div class="form-grup">
        <label class="form-etiket">Şifre *</label>
        <input type="text" id="sSifre" class="form-input" placeholder="sifre123">
      </div>
    </div>
    <div class="form-row">
      <div class="form-grup">
        <label class="form-etiket">Doğum Tarihi</label>
        <input type="date" id="sDogum" class="form-input">
      </div>
      <div class="form-grup">
        <label class="form-etiket">Cinsiyet</label>
        <select id="sCinsiyet" class="form-input">
          <option value="">Seç</option>
          <option value="Erkek">Erkek</option>
          <option value="Kız">Kız</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-grup">
        <label class="form-etiket">Boy (cm)</label>
        <input type="number" id="sBoy" class="form-input" placeholder="165">
      </div>
      <div class="form-grup">
        <label class="form-etiket">Kilo (kg)</label>
        <input type="number" id="sKilo" class="form-input" placeholder="55">
      </div>
    </div>
    <div class="form-grup">
      <label class="form-etiket">Dan / Kuşak</label>
      <input type="text" id="sDan" class="form-input" placeholder="Sarı Kuşak">
    </div>
    <div id="sporcuModalHata" class="hata-mesaji"></div>
    <button class="btn btn-primary" onclick="sporcuKaydet()">Kaydet</button>
    <button class="btn btn-outline" style="margin-top:8px" onclick="modalKapat('sporcuModal')">İptal</button>
  </div>
</div>

<div id="testModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-baslik">📊 Motorik Test Sonuçları</div>
    <input type="hidden" id="testSporcuId">
    <div class="form-grup">
      <label class="form-etiket">Test Tarihi *</label>
      <input type="date" id="tTarih" class="form-input">
    </div>
    <div style="font-size:13px;font-weight:700;color:var(--gray-700);margin:10px 0 8px">Genel Testler (1–9)</div>
    <div class="form-row">
      <div class="form-grup">
        <label class="form-etiket">1 — Uzun Atlama (cm)</label>
        <input type="number" id="t_uzun_atlama" class="form-input" placeholder="152" step="0.1">
      </div>
      <div class="form-grup">
        <label class="form-etiket">2 — Top Fırlatma (cm)</label>
        <input type="number" id="t_saglik_topu" class="form-input" placeholder="380" step="0.1">
      </div>
    </div>
    <div class="form-row">
      <div class="form-grup">
        <label class="form-etiket">3 — 30sn Mekik (tekrar)</label>
        <input type="number" id="t_mekik" class="form-input" placeholder="22">
      </div>
      <div class="form-grup">
        <label class="form-etiket">4 — 30m Sprint (sn)</label>
        <input type="number" id="t_sprint" class="form-input" placeholder="5.1" step="0.01">
      </div>
    </div>
    <div class="form-row">
      <div class="form-grup">
        <label class="form-etiket">5 — Illinois (sn)</label>
        <input type="number" id="t_illinois" class="form-input" placeholder="17.5" step="0.01">
      </div>
      <div class="form-grup">
        <label class="form-etiket">6 — Flamingo (hata)</label>
        <input type="number" id="t_flamingo" class="form-input" placeholder="5">
      </div>
    </div>
    <div class="form-row">
      <div class="form-grup">
        <label class="form-etiket">7 — Otur-Uzan (cm)</label>
        <input type="number" id="t_otur_uzan" class="form-input" placeholder="30" step="0.1">
      </div>
      <div class="form-grup">
        <label class="form-etiket">8 — Beep Test (seviye)</label>
        <input type="number" id="t_beep" class="form-input" placeholder="6.8" step="0.1">
      </div>
    </div>
    <div class="form-row">
      <div class="form-grup">
        <label class="form-etiket">9 — Cetvel Reaksiyon (cm)</label>
        <input type="number" id="t_cetvel" class="form-input" placeholder="18" step="0.1">
      </div>
    </div>
    <div style="font-size:13px;font-weight:700;color:var(--gray-700);margin:12px 0 8px">TKD Özgün Testler (10–13)</div>
    <div class="form-row">
      <div class="form-grup">
        <label class="form-etiket">10 — Dolyo Chagi (tekrar)</label>
        <input type="number" id="t_dolyo" class="form-input" placeholder="17">
      </div>
      <div class="form-grup">
        <label class="form-etiket">13 — Şınav (tekrar)</label>
        <input type="number" id="t_sinav" class="form-input" placeholder="18">
      </div>
    </div>
    <div style="font-size:12px;color:var(--gray-500);margin:10px 0 6px">11 — FSKT · 5 tur × 10sn (KDI otomatik hesaplanır)</div>
    <div class="form-row">
      <div class="form-grup">
        <label class="form-etiket">Tur 1</label>
        <input type="number" id="t_fskt_1" class="form-input" placeholder="18" oninput="fsktOnizle()">
      </div>
      <div class="form-grup">
        <label class="form-etiket">Tur 2</label>
        <input type="number" id="t_fskt_2" class="form-input" placeholder="17" oninput="fsktOnizle()">
      </div>
    </div>
    <div class="form-row">
      <div class="form-grup">
        <label class="form-etiket">Tur 3</label>
        <input type="number" id="t_fskt_3" class="form-input" placeholder="15" oninput="fsktOnizle()">
      </div>
      <div class="form-grup">
        <label class="form-etiket">Tur 4</label>
        <input type="number" id="t_fskt_4" class="form-input" placeholder="14" oninput="fsktOnizle()">
      </div>
    </div>
    <div class="form-row">
      <div class="form-grup">
        <label class="form-etiket">Tur 5</label>
        <input type="number" id="t_fskt_5" class="form-input" placeholder="13" oninput="fsktOnizle()">
      </div>
      <div class="form-grup">
        <label class="form-etiket">Sonuç</label>
        <div id="fsktOnizleDiv" style="padding:11px 13px;background:var(--gray-50);border-radius:8px;font-size:13px;color:var(--gray-500)">5 turu gir</div>
      </div>
    </div>
    <div class="form-row" style="margin-top:8px">
      <div class="form-grup">
        <label class="form-etiket">12 — 60sn DCK (tekrar)</label>
        <input type="number" id="t_dck60" class="form-input" placeholder="65">
      </div>
    </div>
    <div class="form-grup" style="margin-top:8px">
      <label class="form-etiket">Notlar</label>
      <input type="text" id="t_notlar" class="form-input" placeholder="Varsa not...">
    </div>
    <div id="testModalHata" class="hata-mesaji"></div>
    <button class="btn btn-primary" onclick="testKaydet()">Kaydet</button>
    <button class="btn btn-outline" style="margin-top:8px" onclick="modalKapat('testModal')">İptal</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
